<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Jornal Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0d0905;
    --ink:   #c5b49a;
    --dim:   #5a4530;
    --blood: #7e1419;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .page { max-width: 520px; }
  .code {
    font-family: 'Special Elite', serif;
    font-size: 72px;
    letter-spacing: 0.1em;
    color: var(--dim);
    margin-bottom: 8px;
    line-height: 1;
  }
  .label {
    font-family: 'Special Elite', serif;
    font-size: 9px;
    letter-spacing: 0.45em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0.6;
  }
  .text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 36px;
  }

  /* Pigpen cipher */
  .pigpen-wrap {
    margin: 32px auto;
    max-width: 340px;
    border: 1px solid #2a1c0a;
    padding: 20px;
    position: relative;
  }
  .pigpen-label {
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    padding: 0 8px;
    font-family: 'Special Elite', serif;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: #3a2515;
    text-transform: uppercase;
    white-space: nowrap;
  }
  /* SVG pigpen symbols */
  .pigpen-symbols {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    opacity: 0.45;
  }
  .pigpen-symbols svg {
    width: 18px;
    height: 18px;
    stroke: #7e5a30;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: square;
  }

  .back {
    font-family: 'Special Elite', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    opacity: 0.5;
    border-bottom: 1px solid currentColor;
    padding-bottom: 2px;
  }
  .back:hover { opacity: 0.85; }
  .hint {
    font-size: 11px;
    color: #2a1c0a;
    margin-top: 28px;
    font-style: italic;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="page">
  <div class="code">404</div>
  <div class="label">Página não encontrada</div>
  <div class="text">
    O que você procura<br>
    não existe neste caminho.<br><br>
    <em>Ou talvez nunca tenha existido.</em>
  </div>

  <!-- 63 69 66 72 61 64 6f -->
  <div class="pigpen-wrap">
    <div class="pigpen-label">fragmento — cifra desconhecida</div>
    <div class="pigpen-symbols">
      <!-- N: canto superior esquerdo aberto (∟) -->
      <svg viewBox="0 0 18 18"><polyline points="9,2 9,9 2,9"/></svg>
      <!-- Ã: L espelhado com ponto -->
      <svg viewBox="0 0 18 18"><polyline points="9,2 9,9 16,9"/><circle cx="13" cy="5" r="1" fill="#7e5a30" stroke="none"/></svg>
      <!-- O: canto inferior esquerdo -->
      <svg viewBox="0 0 18 18"><polyline points="2,9 9,9 9,16"/></svg>
      <!-- (espaço) -->
      <svg viewBox="0 0 18 18"></svg>
      <!-- E: linha vertical com barras -->
      <svg viewBox="0 0 18 18"><line x1="9" y1="2" x2="9" y2="16"/><line x1="9" y1="9" x2="16" y2="9"/></svg>
      <!-- X: cruzado aberto -->
      <svg viewBox="0 0 18 18"><line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/></svg>
      <!-- I: linha simples vertical -->
      <svg viewBox="0 0 18 18"><line x1="9" y1="3" x2="9" y2="15"/></svg>
      <!-- S: barra diagonal com canto -->
      <svg viewBox="0 0 18 18"><polyline points="2,9 9,2 16,9"/></svg>
      <!-- T: T simples -->
      <svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9"/><line x1="9" y1="9" x2="9" y2="16"/></svg>
      <!-- E: igual acima -->
      <svg viewBox="0 0 18 18"><line x1="9" y1="2" x2="9" y2="16"/><line x1="9" y1="9" x2="16" y2="9"/></svg>
    </div>
  </div>

  <div class="hint">
    esta cifra não leva a lugar nenhum.<br>
    às vezes um beco sem saída é apenas um beco sem saída.
  </div>

  <br><br>
  <a class="back" href="/">← voltar ao jornal</a>
</div>
</body>
</html>
