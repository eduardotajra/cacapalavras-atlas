<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10/05 — Jornal Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:   #f0e4c8;
    --ink:  #1c150e;
    --dim:  #6b5740;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .page {
    max-width: 420px;
    text-align: center;
  }
  .label {
    font-family: 'Special Elite', serif;
    font-size: 9px;
    letter-spacing: 0.45em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .title {
    font-family: 'Special Elite', serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 32px;
  }
  .back {
    font-family: 'Special Elite', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid currentColor;
    padding-bottom: 2px;
    opacity: 0.6;
  }
  .back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="page">
  <div class="label">Jornal Atlas · Edição Nº 7</div>
  <div class="title">10 / 05</div>
  <div class="text">
    Os Quatro Desgraçados desceram ao Tártaro.<br>
    Esta edição está no jornal principal.<br><br>
    <em>Você está procurando outra coisa?</em>
  </div>
  <a class="back" href="/">← voltar ao jornal</a>
</div>
</body>
</html>
