<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>401 — Acesso Negado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080604;
    color: #4a7a3a;

    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box { max-width: 440px; text-align: center; }

  .msg { color: #6aaa52; margin-bottom: 8px; }

  a:hover { color: #6aaa52; }
</style>
</head>
<body>
<!-- 61 71 69 79 6d 72 -->
<div class="box">
  <div class="code">401</div>
  <div class="msg">&gt; Acesso não autorizado.</div>
  <div class="msg">&gt; Essa área não é para administradores.</div>
  <div class="sub">
    Se você está procurando o arquivo,<br>
    a senha não está aqui.<br><br>

  </div>
</div>
